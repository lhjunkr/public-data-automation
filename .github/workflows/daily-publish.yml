name: Daily Public Data Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * *"   # UTC 11:17 = KST 20:17

jobs:
  run-public-data-automation:
    name: Run daily public data automation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: daily-public-data-automation
      cancel-in-progress: false

    env:
      TZ: Asia/Seoul

      ENABLE_FACEBOOK_PUBLISH: "true"
      ENABLE_INSTAGRAM_PUBLISH: "true"
      ENABLE_THREADS_PUBLISH: "true"
      ENABLE_NAVER_BAND_PUBLISH: "true"

      KSTARTUP_API_KEY: ${{ secrets.KSTARTUP_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      R2_ASSETS_ACCESS_KEY_ID: ${{ secrets.R2_ASSETS_ACCESS_KEY_ID }}
      R2_ASSETS_SECRET_ACCESS_KEY: ${{ secrets.R2_ASSETS_SECRET_ACCESS_KEY }}
      R2_ASSETS_BUCKET_NAME: ${{ secrets.R2_ASSETS_BUCKET_NAME }}
      R2_ASSETS_PUBLIC_BASE_URL: ${{ secrets.R2_ASSETS_PUBLIC_BASE_URL }}

      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      IG_USER_ID: ${{ secrets.IG_USER_ID }}

      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      BAND_ACCESS_TOKEN: ${{ secrets.BAND_ACCESS_TOKEN }}
      BAND_KEY: ${{ secrets.BAND_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check required secrets
        run: python -m scripts.check_required_secrets

      - name: Run automation
        run: python main.py

      - name: Upload generated outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-data-automation-outputs
          path: outputs/
