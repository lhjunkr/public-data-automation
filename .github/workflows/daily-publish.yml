name: Daily Public Data Automation

"on":
  workflow_dispatch:
  schedule:
    - cron: "08 9 * * *"

jobs:
  run-public-data-automation:
    name: Run daily public data automation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: daily-public-data-automation
      cancel-in-progress: false

    env:
      TZ: Asia/Seoul

      ENABLE_FACEBOOK_PUBLISH: "true"
      ENABLE_INSTAGRAM_PUBLISH: "true"
      ENABLE_THREADS_PUBLISH: "true"
      ENABLE_NAVER_BAND_PUBLISH: "true"

      KSTARTUP_API_KEY: ${{ secrets.KSTARTUP_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      R2_ASSETS_ACCESS_KEY_ID: ${{ secrets.R2_ASSETS_ACCESS_KEY_ID }}
      R2_ASSETS_SECRET_ACCESS_KEY: ${{ secrets.R2_ASSETS_SECRET_ACCESS_KEY }}
      R2_ASSETS_BUCKET_NAME: ${{ secrets.R2_ASSETS_BUCKET_NAME }}
      R2_ASSETS_PUBLIC_BASE_URL: ${{ secrets.R2_ASSETS_PUBLIC_BASE_URL }}

      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      IG_USER_ID: ${{ secrets.IG_USER_ID }}

      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      BAND_ACCESS_TOKEN: ${{ secrets.BAND_ACCESS_TOKEN }}
      BAND_KEY: ${{ secrets.BAND_KEY }}

      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check required secrets
        run: python -m scripts.check_required_secrets

      - name: Publish daily posts
        run: |
          set +e
          python -m scripts.run_daily_publish 2>&1 | tee daily_publish_output.txt
          publish_exit_code="${PIPESTATUS[0]}"
          echo "$publish_exit_code" > daily_publish_exit_code.txt
          exit "$publish_exit_code"

      - name: Build email report body
        if: always()
        run: |
          {
            echo "Workflow: Daily Public Data Automation"
            echo "Status: ${{ job.status }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "Publish Exit Code:"
            if [ -f daily_publish_exit_code.txt ]; then
              cat daily_publish_exit_code.txt
            else
              echo "publish step was not completed"
            fi
            echo ""
            echo "Publish Output:"
            echo ""
            if [ -f daily_publish_output.txt ]; then
              cat daily_publish_output.txt
            else
              echo "daily_publish_output.txt was not generated."
            fi
          } > email_report.txt

      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Public Data Automation ${{ job.status }} - Run #${{ github.run_number }}"
          to: ${{ secrets.REPORT_EMAIL_TO }}
          from: Public Data Automation <${{ secrets.SMTP_USERNAME }}>
          body: file://email_report.txt
          
